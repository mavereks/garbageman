<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Garbage Man</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1a0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    color: #7ac142;
    font-size: 1.9rem;
    letter-spacing: 5px;
    margin-bottom: 10px;
    text-shadow: 0 0 18px #3a7a1a66;
  }
  canvas {
    display: block;
    border: 2px solid #2a4a2a;
    border-radius: 6px;
    touch-action: none;
    cursor: default;
  }
  #hint {
    color: #3a5a3a;
    font-size: 11px;
    letter-spacing: 2px;
    margin-top: 8px;
  }
</style>
</head>
<body>
<h1>🗑 GARBAGE MAN</h1>
<canvas id="c" width="600" height="580"></canvas>
<p id="hint">DRAG ITEMS TO THE CORRECT BIN BEFORE THEY FALL</p>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 600, H = 580;
const BIN_Y = 458, BIN_H = 112;
const MAX_SCALE = 3.0, MIN_SCALE = 0.7;

// ── Data ──────────────────────────────────────────────────────
const ITEM_DATA = [
  { name: 'Apple Core',     emoji: '🍎', cat: 'compost'   },
  { name: 'Banana Peel',    emoji: '🍌', cat: 'compost'   },
  { name: 'Coffee Grounds', emoji: '☕', cat: 'compost'   },
  { name: 'Plastic Bottle', emoji: '🧴', cat: 'recycling' },
  { name: 'Newspaper',      emoji: '📰', cat: 'recycling' },
  { name: 'Glass Jar',      emoji: '🫙', cat: 'recycling' },
  { name: 'Cardboard Box',  emoji: '📦', cat: 'recycling' },
  { name: 'Chip Bag',       emoji: '🍿', cat: 'garbage'   },
  { name: 'Styrofoam Cup',  emoji: '🥤', cat: 'garbage'   },
  { name: 'Candy Wrapper',  emoji: '🍬', cat: 'garbage'   },
];

const BINS = [
  { label: 'COMPOST',   cat: 'compost',
    color: '#4d7c2e', rim: '#6bb03f', dark: '#2d4d1a', icon: '🌱',
    x: 18,  y: BIN_Y, w: 172, h: BIN_H },
  { label: 'RECYCLING', cat: 'recycling',
    color: '#1e5b9e', rim: '#3d85d4', dark: '#0d3667', icon: '♻️',
    x: 214, y: BIN_Y, w: 172, h: BIN_H },
  { label: 'GARBAGE',   cat: 'garbage',
    color: '#585858', rim: '#8a8a8a', dark: '#333',    icon: '🗑️',
    x: 410, y: BIN_Y, w: 172, h: BIN_H },
];

// ── State ─────────────────────────────────────────────────────
let st = newState();

function newState() {
  return {
    score: 0, hi: 0, scale: 1.0,
    items: [], drag: null, feedback: [],
    binFlash: {}, spawnTimer: 0, spawnInterval: 200,
    over: false, uid: 0,
  };
}

// ── Helpers ───────────────────────────────────────────────────
function rr(x, y, w, h, r = 8) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h,     x, y + h - r,     r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y,         x + r, y,         r);
  ctx.closePath();
}

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

function spawnItem() {
  const t = ITEM_DATA[Math.floor(Math.random() * ITEM_DATA.length)];
  st.items.push({
    id: st.uid++,
    name: t.name, emoji: t.emoji, cat: t.cat,
    x: 65 + Math.random() * (W - 130),
    y: -45,
    vy: 0.45 + Math.random() * 0.4,
    w: 88, h: 54,
  });
}

// ── Draw: background ─────────────────────────────────────────
function drawBG() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,    '#141f0f');
  g.addColorStop(0.72, '#0c160a');
  g.addColorStop(1,    '#060d04');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // subtle horizontal rules
  ctx.strokeStyle = '#192614';
  ctx.lineWidth = 1;
  for (let y = 50; y < BIN_Y - 20; y += 70) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // ground slab
  ctx.fillStyle = '#1c2a18';
  ctx.fillRect(0, BIN_Y - 14, W, H - BIN_Y + 14);
  ctx.strokeStyle = '#3a5a2a';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, BIN_Y - 14); ctx.lineTo(W, BIN_Y - 14); ctx.stroke();
}

// ── Draw: bins ────────────────────────────────────────────────
function drawBins() {
  BINS.forEach((b, i) => {
    const flash = (st.binFlash[i] || 0) > 0;

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,.45)';
    rr(b.x + 5, b.y + 7, b.w, b.h, 8); ctx.fill();

    // body
    ctx.fillStyle = b.color;
    rr(b.x, b.y, b.w, b.h, 8); ctx.fill();

    // flash highlight
    if (flash) {
      ctx.fillStyle = 'rgba(255,255,255,.18)';
      rr(b.x, b.y, b.w, b.h, 8); ctx.fill();
    }

    // inner dark cavity
    ctx.fillStyle = b.dark;
    rr(b.x + 8, b.y + 34, b.w - 16, b.h - 40, 4); ctx.fill();

    // rim strip
    ctx.fillStyle = b.rim;
    ctx.fillRect(b.x - 4, b.y, b.w + 8, 16);

    // lid handle
    ctx.fillStyle = b.dark;
    rr(b.x + b.w / 2 - 11, b.y - 9, 22, 11, 4); ctx.fill();
    ctx.fillStyle = b.rim;
    rr(b.x + b.w / 2 - 11, b.y - 9, 22, 11, 4);
    ctx.lineWidth = 1.5; ctx.strokeStyle = b.dark; ctx.stroke();

    // label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px "Courier New"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.label, b.x + b.w / 2, b.y + 24);

    // icon emoji
    ctx.font = '26px sans-serif';
    ctx.fillText(b.icon, b.x + b.w / 2, b.y + 76);
  });
}

// ── Draw: character ───────────────────────────────────────────
function drawCharacter(scale) {
  const cx = W / 2, cy = 220;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  const bad  = clamp((scale - 1.0) / (MAX_SCALE - 1.0), 0, 1);
  const bR   = Math.round(bad * 195);
  const bG   = Math.round((1 - bad) * 145 + 28);
  const body = `rgb(${bR},${bG},38)`;
  const skin = `hsl(${28 - bad * 14},${68 - bad * 18}%,${66 - bad * 10}%)`;

  // ground shadow
  ctx.fillStyle = 'rgba(0,0,0,.22)';
  ctx.beginPath();
  ctx.ellipse(0, 70, 24, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // legs
  ctx.strokeStyle = '#222'; ctx.lineWidth = 6.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-8, 37); ctx.lineTo(-11, 65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 8, 37); ctx.lineTo( 11, 65); ctx.stroke();

  // boots
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(-14, 67, 10, 4.5, -0.15, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 14, 67, 10, 4.5,  0.15, 0, Math.PI * 2); ctx.fill();

  // body
  ctx.fillStyle = body;
  rr(-17, -2, 34, 40, 7); ctx.fill();

  // vest stripes
  ctx.strokeStyle = `rgba(255,255,100,${0.22 + bad * 0.1})`; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-17, 8); ctx.lineTo(17, 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-17,20); ctx.lineTo(17,20); ctx.stroke();

  // belt
  ctx.fillStyle = '#111'; ctx.fillRect(-17, 29, 34, 5);
  ctx.fillStyle = '#c8a000';
  rr(-5, 27, 10, 8, 2); ctx.fill();

  // arms
  ctx.strokeStyle = body; ctx.lineWidth = 7.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-17, 6); ctx.lineTo(-31, 27); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 17, 6); ctx.lineTo( 31, 27); ctx.stroke();

  // gloves
  ctx.fillStyle = '#d8c850';
  ctx.beginPath(); ctx.arc(-31, 28, 6.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 31, 28, 6.5, 0, Math.PI * 2); ctx.fill();

  // neck
  ctx.fillStyle = skin; ctx.fillRect(-5, -10, 10, 12);

  // head
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(0, -22, 17, 0, Math.PI * 2); ctx.fill();

  // blush when bad
  if (bad > 0.28) {
    ctx.fillStyle = `rgba(220,70,70,${bad * 0.32})`;
    ctx.beginPath(); ctx.arc(-8, -18, 6.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 8, -18, 6.5, 0, Math.PI * 2); ctx.fill();
  }

  // eye whites
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-6.5, -24, 4.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 6.5, -24, 4.5, 0, Math.PI * 2); ctx.fill();

  // pupils (look up when happy, forward when scared)
  const py = bad > 0.5 ? -23 : -25;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(-6.5, py, 2.6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 6.5, py, 2.6, 0, Math.PI * 2); ctx.fill();

  // eyebrows
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
  ctx.beginPath();
  if (bad > 0.5) {
    // worried V shape
    ctx.moveTo(-11, -31); ctx.lineTo(-3.5, -33.5);
    ctx.moveTo( 11, -31); ctx.lineTo( 3.5, -33.5);
  } else {
    // neutral/happy
    ctx.moveTo(-11, -32); ctx.lineTo(-2.5, -30);
    ctx.moveTo( 11, -32); ctx.lineTo( 2.5, -30);
  }
  ctx.stroke();

  // mouth
  ctx.strokeStyle = '#554'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath();
  if (bad > 0.5) {
    ctx.moveTo(-6, -14); ctx.quadraticCurveTo(0, -17.5, 6, -14); // frown
  } else {
    ctx.moveTo(-6, -14); ctx.quadraticCurveTo(0, -10.5, 6, -14); // smile
  }
  ctx.stroke();

  // hat brim
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(-21, -41, 42, 12);

  // hat crown
  ctx.fillStyle = '#264826';
  rr(-15, -59, 30, 20, 3); ctx.fill();

  // hat badge (star)
  ctx.fillStyle = '#c8a000';
  ctx.beginPath(); ctx.arc(0, -49, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 5px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('GC', 0, -49);

  ctx.restore();
}

// ── Draw: falling item ────────────────────────────────────────
function drawItem(item) {
  const dragging = st.drag && st.drag.item.id === item.id;
  const x = item.x - item.w / 2;
  const y = item.y - item.h / 2;

  // drop shadow when held
  if (dragging) {
    ctx.fillStyle = 'rgba(0,0,0,.32)';
    rr(x + 6, y + 6, item.w, item.h, 10); ctx.fill();
  }

  ctx.fillStyle = dragging ? '#fffff2ee' : '#ffffffcc';
  rr(x, y, item.w, item.h, 10); ctx.fill();

  ctx.strokeStyle = dragging ? '#555' : '#aaa';
  ctx.lineWidth = 1.5;
  rr(x, y, item.w, item.h, 10); ctx.stroke();

  // emoji
  ctx.font = '23px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(item.emoji, item.x, item.y - 8);

  // name
  ctx.fillStyle = '#333';
  ctx.font = 'bold 9px "Courier New"';
  ctx.textBaseline = 'top';
  ctx.fillText(item.name, item.x, item.y + 10);
}

// ── Draw: HUD ─────────────────────────────────────────────────
function drawHUD() {
  // score box
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  rr(10, 10, 118, 50, 8); ctx.fill();
  ctx.fillStyle = '#6bb03f';
  ctx.font = 'bold 11px "Courier New"';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('SCORE', 22, 17);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 23px "Courier New"';
  ctx.fillText(String(st.score).padStart(4, '0'), 22, 31);

  // hi score box
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  rr(138, 10, 118, 50, 8); ctx.fill();
  ctx.fillStyle = '#c8a000';
  ctx.font = 'bold 11px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText('BEST', 150, 17);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 23px "Courier New"';
  ctx.fillText(String(st.hi).padStart(4, '0'), 150, 31);

  // size meter
  const mx = 270, my = 12, mw = 220, mh = 16;
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  rr(mx - 6, my - 4, mw + 58, mh + 26, 8); ctx.fill();

  ctx.fillStyle = '#2a3a2a';
  rr(mx, my + 13, mw, mh, 4); ctx.fill();

  const pct = clamp((st.scale - 1.0) / (MAX_SCALE - 1.0), 0, 1);
  if (pct > 0.005) {
    ctx.fillStyle = pct < 0.4 ? '#5cb85c' : pct < 0.72 ? '#f0ad4e' : '#d9534f';
    rr(mx, my + 13, mw * pct, mh, 4); ctx.fill();
  }

  ctx.fillStyle = '#8aa';
  ctx.font = '10px "Courier New"';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('SIZE METER', mx, my + 2);
  ctx.textAlign = 'right';
  ctx.fillStyle = pct > 0.72 ? '#f88' : '#ccc';
  ctx.fillText(`${Math.round(pct * 100)}%`, mx + mw, my + 2);
}

// ── Draw: floating feedback text ──────────────────────────────
function drawFeedback() {
  for (const f of st.feedback) {
    ctx.save();
    ctx.globalAlpha = clamp(f.life / 48, 0, 1);
    ctx.fillStyle = f.color;
    ctx.font = `bold 18px "Courier New"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }
}

// ── Draw: game over screen ────────────────────────────────────
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,.8)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#d9534f';
  ctx.font = 'bold 46px "Courier New"';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 64);

  ctx.fillStyle = '#aaa';
  ctx.font = '15px "Courier New"';
  ctx.fillText('You grew too big from bad sorting!', W / 2, H / 2 - 22);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px "Courier New"';
  ctx.fillText(`Score: ${st.score}`, W / 2, H / 2 + 16);

  if (st.score === st.hi && st.hi > 0) {
    ctx.fillStyle = '#c8a000';
    ctx.font = 'bold 14px "Courier New"';
    ctx.fillText('★  NEW HIGH SCORE  ★', W / 2, H / 2 + 48);
  }

  // play again button
  ctx.fillStyle = '#3a6a20';
  rr(W / 2 - 100, H / 2 + 70, 200, 50, 10); ctx.fill();
  ctx.strokeStyle = '#6bb03f'; ctx.lineWidth = 2;
  rr(W / 2 - 100, H / 2 + 70, 200, 50, 10); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 19px "Courier New"';
  ctx.fillText('PLAY AGAIN', W / 2, H / 2 + 95);
}

// ── Update ────────────────────────────────────────────────────
function update() {
  if (st.over) return;

  // spawn
  st.spawnTimer++;
  if (st.spawnTimer >= st.spawnInterval && st.items.length < 4) {
    spawnItem();
    st.spawnTimer = 0;
    st.spawnInterval = Math.max(95, 200 - Math.floor(st.score / 40) * 15);
  }

  // move items; check if missed
  for (let i = st.items.length - 1; i >= 0; i--) {
    const it = st.items[i];
    if (st.drag && st.drag.item.id === it.id) continue;
    it.y += it.vy;
    if (it.y > BIN_Y + 10) {
      st.items.splice(i, 1);
      st.score = Math.max(0, st.score - 3);
      st.scale = Math.min(MAX_SCALE, st.scale + 0.14);
      push(`MISSED -3`, it.x, BIN_Y - 35, '#f0ad4e');
      if (st.scale >= MAX_SCALE) endGame();
    }
  }

  // float feedback upward
  for (let i = st.feedback.length - 1; i >= 0; i--) {
    st.feedback[i].y -= 0.65;
    if (--st.feedback[i].life <= 0) st.feedback.splice(i, 1);
  }

  // cool down bin flashes
  for (const k in st.binFlash) {
    if (--st.binFlash[k] <= 0) delete st.binFlash[k];
  }
}

function push(text, x, y, color) {
  st.feedback.push({ text, x, y, life: 58, color });
}

function endGame() {
  st.over = true;
  st.hi = Math.max(st.hi, st.score);
}

// ── Sort logic ────────────────────────────────────────────────
function sortItem(item, bin) {
  const idx = BINS.indexOf(bin);
  st.items.splice(st.items.indexOf(item), 1);
  st.binFlash[idx] = 20;

  if (item.cat === bin.cat) {
    st.score += 10;
    st.scale = Math.max(MIN_SCALE, st.scale - 0.13);
    push('+10  CORRECT!', bin.x + bin.w / 2, bin.y - 12, '#7ac142');
  } else {
    st.score = Math.max(0, st.score - 5);
    st.scale = Math.min(MAX_SCALE, st.scale + 0.26);
    push('-5  WRONG!', bin.x + bin.w / 2, bin.y - 12, '#d9534f');
    push(`→ ${item.cat.toUpperCase()}`, item.x, item.y - 44, '#f0ad4e');
    if (st.scale >= MAX_SCALE) endGame();
  }
}

// ── Game loop ─────────────────────────────────────────────────
function loop() {
  update();
  ctx.clearRect(0, 0, W, H);
  drawBG();
  drawBins();
  drawCharacter(st.scale);

  // non-dragged items first, dragged on top
  for (const it of st.items)
    if (!st.drag || st.drag.item.id !== it.id) drawItem(it);
  if (st.drag) drawItem(st.drag.item);

  drawHUD();
  drawFeedback();
  if (st.over) drawGameOver();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────
function getPos(e) {
  const r  = canvas.getBoundingClientRect();
  const sx = W / r.width, sy = H / r.height;
  const s  = e.touches ? e.touches[0] : e;
  return { x: (s.clientX - r.left) * sx, y: (s.clientY - r.top) * sy };
}

function itemAt(x, y) {
  for (let i = st.items.length - 1; i >= 0; i--) {
    const it = st.items[i];
    if (Math.abs(x - it.x) < it.w / 2 && Math.abs(y - it.y) < it.h / 2) return it;
  }
  return null;
}

function binAt(x, y) {
  return BINS.find(b => x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) || null;
}

function onDown(e) {
  const p = getPos(e);
  if (st.over) {
    if (p.x >= W/2 - 100 && p.x <= W/2 + 100 && p.y >= H/2 + 70 && p.y <= H/2 + 120) {
      reset();
    }
    return;
  }
  const it = itemAt(p.x, p.y);
  if (it) {
    st.drag = { item: it, ox: p.x - it.x, oy: p.y - it.y };
    canvas.style.cursor = 'grabbing';
  }
}

function onMove(e) {
  if (!st.drag) return;
  const p = getPos(e);
  st.drag.item.x = p.x - st.drag.ox;
  st.drag.item.y = p.y - st.drag.oy;
}

function onUp() {
  if (!st.drag) return;
  const bin = binAt(st.drag.item.x, st.drag.item.y);
  if (bin) sortItem(st.drag.item, bin);
  st.drag = null;
  canvas.style.cursor = 'default';
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('mouseleave', () => { st.drag = null; canvas.style.cursor = 'default'; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp();    }, { passive: false });

function reset() {
  const hi = st.hi;
  st = newState();
  st.hi = hi;
  spawnItem();
}

// ── Start ─────────────────────────────────────────────────────
spawnItem();
loop();
</script>
</body>
</html>
